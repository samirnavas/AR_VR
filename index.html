<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Luxury House Interior - VR Experience</title>
  <meta name="description" content="Immersive VR tour of a luxurious house interior built with A-Frame">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.5.0/dist/aframe-extras.min.js"></script>

  <script>
    // Custom component to handle VR thumbstick movement for Meta Quest
    AFRAME.registerComponent('vr-thumbstick-movement', {
      schema: { speed: { default: 0.08 } },
      init: function () {
        this.camera = document.querySelector('[camera]');
        this.rig = document.querySelector('#rig');
        this.moveX = 0;
        this.moveY = 0;
        this.direction = new THREE.Vector3();
        this.euler = new THREE.Euler(0, 0, 0, 'YXZ');

        // Listen for thumbstick movement events from Meta Quest controllers
        this.el.addEventListener('thumbstickmoved', (evt) => {
          this.moveX = evt.detail.x;
          this.moveY = evt.detail.y;
        });
      },
      tick: function (time, timeDelta) {
        if (!this.camera || !this.rig) return;

        // Deadzone of 0.1 to prevent stick drift
        if (Math.abs(this.moveX) < 0.1 && Math.abs(this.moveY) < 0.1) return;

        // Extract camera Y rotation (yaw) to determine forward direction based on head look
        this.euler.setFromQuaternion(this.camera.object3D.quaternion);
        this.euler.x = 0;
        this.euler.z = 0;

        // Apply thumbstick values to a direction vector
        // Pushing stick forward: moveY is negative, mapping smoothly to -Z (forward in WebXR)
        this.direction.set(this.moveX, 0, this.moveY);
        this.direction.applyEuler(this.euler);

        // Apply movement speed considering frame time (timeDelta)
        const dt = Math.min(timeDelta || 16.6, 50) / 16.6;
        this.direction.multiplyScalar(this.data.speed * dt);

        this.rig.object3D.position.add(this.direction);
      }
    });

    // ── Shared helpers for the color picker system ──
    function createCheckerCanvas(size) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const s = size / 8;
      for (let r = 0; r < 8; r++) {
        for (let col = 0; col < 8; col++) {
          ctx.fillStyle = (r + col) % 2 === 0 ? 'rgba(212,175,55,0.45)' : 'rgba(255,255,255,0.08)';
          ctx.fillRect(col * s, r * s, s, s);
        }
      }
      return c;
    }
    const checkerTex = new THREE.CanvasTexture(createCheckerCanvas(256));
    checkerTex.wrapS = checkerTex.wrapT = THREE.RepeatWrapping;
    checkerTex.repeat.set(4, 4);

    let highlightOverlay = null; // Single reusable overlay mesh

    function removeHighlight() {
      if (highlightOverlay && highlightOverlay.parent) {
        highlightOverlay.parent.remove(highlightOverlay);
      }
    }

    function addHighlightTo(planeEl) {
      removeHighlight();
      // Create overlay if first time
      if (!highlightOverlay) {
        const geo = new THREE.PlaneGeometry(1, 1);
        const mat = new THREE.MeshBasicMaterial({
          map: checkerTex, transparent: true, opacity: 0.6,
          depthTest: true, side: THREE.DoubleSide
        });
        highlightOverlay = new THREE.Mesh(geo, mat);
      }
      // Match the size of the target plane
      const w = parseFloat(planeEl.getAttribute('width')) || 1;
      const h = parseFloat(planeEl.getAttribute('height')) || 1;
      highlightOverlay.scale.set(w, h, 1);
      // Position slightly above the surface so it doesn't z-fight
      highlightOverlay.position.set(0, 0, 0.005);
      planeEl.object3D.add(highlightOverlay);
    }

    function closeMenu() {
      const menu = document.querySelector('#vr-color-menu');
      if (menu) menu.setAttribute('visible', 'false');
      removeHighlight();
      window.activePlane = null;
    }
    window.closeColorMenu = closeMenu;

    // ── Component: makes a plane clickable for color picking ──
    AFRAME.registerComponent('color-picker-target', {
      init: function () {
        this.menu = document.querySelector('#vr-color-menu');
        this.camera = document.querySelector('[camera]');
        this.el.addEventListener('click', (evt) => {
          if (!this.menu || !this.camera) return;
          // If clicking the same plane, toggle menu off
          if (window.activePlane === this.el && this.menu.getAttribute('visible')) {
            closeMenu();
            return;
          }
          window.activePlane = this.el;
          addHighlightTo(this.el);

          // Position menu 1.5 m in front of the camera
          const cam = this.camera.object3D;
          const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion);
          const pos = cam.getWorldPosition(new THREE.Vector3()).add(dir.multiplyScalar(1.5));
          this.menu.object3D.position.copy(pos);
          this.menu.object3D.lookAt(cam.getWorldPosition(new THREE.Vector3()));
          this.menu.setAttribute('visible', 'true');
        });
      }
    });

    // ── Component: individual swatch button ──
    AFRAME.registerComponent('color-swatch', {
      schema: { color: { type: 'string' } },
      init: function () {
        this.el.addEventListener('click', (evt) => {
          evt.stopPropagation();
          if (window.activePlane) {
            window.activePlane.setAttribute('material', 'color', this.data.color);
          }
          closeMenu();
        });
      }
    });
  </script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #FAF8F5 0%, #EAE4D9 50%, #D8CFC4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.5s ease;
      font-family: 'Georgia', serif;
      color: #d4af37;
    }

    #loading-screen h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    #loading-screen p {
      font-size: 1rem;
      color: #c9b06b;
      letter-spacing: 2px;
    }

    .loader {
      width: 200px;
      height: 4px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 2px;
      margin-top: 30px;
      overflow: hidden;
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #d4af37, #f4e5b0, #d4af37);
      border-radius: 2px;
      animation: load 3s ease forwards;
    }

    @keyframes load {
      to {
        width: 100%;
      }
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #room-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .nav-btn {
      background: linear-gradient(135deg, #d4af37, #b8941f);
      color: #2B2B2B;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .nav-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }

    .nav-btn.active {
      background: #f4e5b0;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <h1>✦ MAISON DE LUXE ✦</h1>
    <p>Preparing Your Virtual Estate Tour</p>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>

  <div id="room-nav">
    <button class="nav-btn active" onclick="goToRoom('living')">Living Room</button>
    <button class="nav-btn" onclick="goToRoom('dining')">Dining Room</button>
    <button class="nav-btn" onclick="goToRoom('bedroom')">Bedroom</button>
    <button class="nav-btn" onclick="goToRoom('kitchen')">Kitchen</button>
  </div>

  <a-scene id="vr-scene" renderer="antialias: true; colorManagement: true" loading-screen="enabled: false">

    <!-- Asset Management -->
    <a-assets timeout="15000">
      <img id="wood-floor" src="textures/wood_floor.png" crossorigin="anonymous">
      <img id="marble-tex" src="textures/marble_texture.png" crossorigin="anonymous">
      <img id="wall-tex" src="textures/wall_texture.png" crossorigin="anonymous">
      <img id="ceiling-tex" src="textures/ceiling_texture.png" crossorigin="anonymous">
      <img id="painting" src="textures/painting_art.png" crossorigin="anonymous">
      <img id="bookshelf" src="textures/bookshelf_texture.png" crossorigin="anonymous">
      <img id="fireplace" src="textures/fireplace_texture.png" crossorigin="anonymous">
      <img id="rug-tex" src="textures/rug_texture.png" crossorigin="anonymous">
      <img id="window-view" src="textures/window_view.png" crossorigin="anonymous">
    </a-assets>

    <!-- Camera & Controls -->
    <!-- Removed press-to-move, keeping movement-controls for desktop WASD fallback -->
    <a-entity id="rig" position="0 0 0" movement-controls="speed: 0.15">
      <a-entity id="camera" camera look-controls wasd-controls="acceleration:20" position="0 1.6 0">
        <a-cursor color="#d4af37" fuse="true" fuse-timeout="2000" raycaster="objects: .clickable"
          geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.01" material="color: #d4af37; shader: flat">
        </a-cursor>
      </a-entity>

      <!-- Hand Controllers so VR joysticks are mapped and lasers appear -->
      <!-- Attached vr-thumbstick-movement to the left hand -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10"
        vr-thumbstick-movement="speed: 0.08"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10"></a-entity>
    </a-entity>

    <!-- Global Floating Color Menu (Hidden by default, spawned on click) -->
    <a-entity id="vr-color-menu" visible="false" position="0 -10 0">
      <!-- Menu Background Panel -->
      <a-plane width="1.8" height="0.8" color="#1A1A1A" opacity="0.9" material="shader: flat"
        position="0 0 0"></a-plane>
      <a-text value="Select Surface Color" color="#D4AF37" align="center" position="0 0.3 0.01" width="3.5"
        font="mozillavr"></a-text>

      <!-- Close Button -->
      <a-box class="clickable" position="0.75 0.3 0.02" width="0.15" height="0.15" depth="0.01" color="#FF4D4D"
        onclick="window.closeColorMenu(); event.stopPropagation();"></a-box>
      <a-text value="X" color="#FFF" align="center" position="0.75 0.3 0.03" width="3" font="mozillavr"
        onclick="window.closeColorMenu(); event.stopPropagation();"></a-text>

      <!-- Swatches Grid (Premium Palette) -->
      <!-- Pristine White -->
      <a-box class="clickable" color-swatch="color: #FFFFFF" color="#FFFFFF" position="-0.6 0 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Alabaster / Luxury White -->
      <a-box class="clickable" color-swatch="color: #FDFBF7" color="#FDFBF7" position="-0.2 0 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Warm Light Cream -->
      <a-box class="clickable" color-swatch="color: #FAF6F0" color="#FAF6F0" position="0.2 0 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Pearl Grey -->
      <a-box class="clickable" color-swatch="color: #E2E2E2" color="#E2E2E2" position="0.6 0 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>

      <!-- Charcoal Navy Accent -->
      <a-box class="clickable" color-swatch="color: #1a2a3a" color="#1a2a3a" position="-0.6 -0.4 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Deep Burgundy Accent -->
      <a-box class="clickable" color-swatch="color: #4a1c1c" color="#4a1c1c" position="-0.2 -0.4 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Rich Gold Accent -->
      <a-box class="clickable" color-swatch="color: #D4AF37" color="#D4AF37" position="0.2 -0.4 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
      <!-- Forest Green Accent -->
      <a-box class="clickable" color-swatch="color: #2b3d2b" color="#2b3d2b" position="0.6 -0.4 0.02" width="0.3"
        height="0.3" depth="0.05"></a-box>
    </a-entity>

    <!-- Ambient & Directional Lighting (Luxurious Warm) -->
    <a-entity light="type: ambient; color: #FFECD2; intensity: 0.45"></a-entity>
    <a-entity light="type: directional; color: #FFC88A; intensity: 0.75" position="2 5 -2"></a-entity>

    <!-- ==================== LIVING ROOM ==================== -->
    <a-entity id="living-room" position="0 0 0">
      <!-- Floor -->
      <!-- Floor (Premium Light Tiling) -->
      <a-plane class="clickable" color-picker-target position="0 0.01 0" rotation="-90 0 0" width="12" height="12"
        material="color: #FAF6F0; metalness: 0.2; roughness: 0.1"></a-plane>
      <!-- Ceiling (Pristine White) -->
      <a-plane class="clickable" color-picker-target position="0 4 0" rotation="90 0 0" width="12" height="12"
        material="color: #FFFFFF; roughness: 0.9"></a-plane>

      <!-- Walls -->
      <a-plane class="clickable" color-picker-target position="0 2 -6" width="12" height="4"
        material="color: #FDFBF7; roughness: 0.8"></a-plane>
      <a-plane class="clickable" color-picker-target position="0 2 6" rotation="0 180 0" width="12" height="4"
        material="color: #FDFBF7; roughness: 0.8"></a-plane>
      <a-plane class="clickable" color-picker-target position="-6 2 0" rotation="0 90 0" width="12" height="4"
        material="color: #FDFBF7; roughness: 0.8"></a-plane>
      <a-plane class="clickable" color-picker-target position="6 2 0" rotation="0 -90 0" width="12" height="4"
        material="color: #FDFBF7; roughness: 0.8"></a-plane>

      <!-- Crown Molding (top of walls) -->
      <a-box position="0 3.85 -5.95" width="12" height="0.15" depth="0.12" color="#E8DCC8"></a-box>
      <a-box position="0 3.85 5.95" width="12" height="0.15" depth="0.12" color="#E8DCC8"></a-box>
      <a-box position="-5.95 3.85 0" width="0.12" height="0.15" depth="12" color="#E8DCC8"></a-box>
      <a-box position="5.95 3.85 0" width="0.12" height="0.15" depth="12" color="#E8DCC8"></a-box>

      <!-- Baseboard -->
      <a-box position="0 0.08 -5.95" width="12" height="0.16" depth="0.08" color="#F5F2EB"></a-box>
      <a-box position="0 0.08 5.95" width="12" height="0.16" depth="0.08" color="#F5F2EB"></a-box>
      <a-box position="-5.95 0.08 0" width="0.08" height="0.16" depth="12" color="#F5F2EB"></a-box>
      <a-box position="5.95 0.08 0" width="0.08" height="0.16" depth="12" color="#F5F2EB"></a-box>

      <!-- Fireplace on back wall -->
      <a-image src="#fireplace" position="0 1.5 -5.85" width="3" height="2.8"></a-image>
      <a-box position="0 0.2 -5.7" width="2.5" height="0.15" depth="0.6" color="#FAFAFA"></a-box>
      <a-box position="0 2.95 -5.7" width="3.2" height="0.12" depth="0.5" material="src: #marble-tex"></a-box>

      <!-- Fire glow light -->
      <a-entity light="type: point; color: #FF6522; intensity: 0.8; distance: 6" position="0 1 -5.2">
        <a-animation attribute="light.intensity" from="0.6" to="1" dur="1500" direction="alternate" repeat="indefinite"
          easing="ease-in-out-sine"></a-animation>
      </a-entity>

      <!-- Large Sofa -->
      <a-entity position="0 0 -1.5">
        <a-box position="0 0.35 0" width="3.5" height="0.4" depth="1.1" color="#FAFAFA"></a-box>
        <a-box position="0 0.75 -0.4" width="3.5" height="0.5" depth="0.25" color="#EBE6DF"></a-box>
        <a-box position="-1.6 0.65 0" width="0.25" height="0.35" depth="1.1" color="#EBE6DF"></a-box>
        <a-box position="1.6 0.65 0" width="0.25" height="0.35" depth="1.1" color="#EBE6DF"></a-box>
        <!-- Cushions -->
        <a-box position="-0.8 0.6 0" width="0.9" height="0.12" depth="0.8" color="#EAE6DF"></a-box>
        <a-box position="0.8 0.6 0" width="0.9" height="0.12" depth="0.8" color="#EAE6DF"></a-box>
        <a-box position="0 0.6 0" width="0.9" height="0.12" depth="0.8" color="#D9D2C5"></a-box>
        <!-- Throw pillows -->
        <a-box position="-1.2 0.75 0.1" width="0.35" height="0.35" depth="0.1" rotation="0 0 5" color="#D4AF37"></a-box>
        <a-box position="1.2 0.75 0.1" width="0.35" height="0.35" depth="0.1" rotation="0 0 -5" color="#D4AF37"></a-box>
      </a-entity>

      <!-- Coffee Table -->
      <a-entity position="0 0 0.8">
        <a-box position="0 0.4 0" width="1.5" height="0.06" depth="0.8" material="src: #marble-tex"></a-box>
        <a-cylinder position="-0.55 0.2 -0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="0.55 0.2 -0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="-0.55 0.2 0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="0.55 0.2 0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <!-- Decorative books on table -->
        <a-box position="-0.3 0.47 0" width="0.3" height="0.06" depth="0.22" color="#1B3A4B"></a-box>
        <a-box position="-0.3 0.53 0" width="0.28" height="0.05" depth="0.2" color="#EAE6DF"></a-box>
        <!-- Vase -->
        <a-cylinder position="0.4 0.55 0" radius="0.08" height="0.25" color="#D4AF37"
          material="metalness: 0.7; roughness: 0.3"></a-cylinder>
      </a-entity>

      <!-- Side Armchairs -->
      <a-entity position="-3 0 0" rotation="0 45 0">
        <a-box position="0 0.35 0" width="1.1" height="0.35" depth="1" color="#FAFAFA"></a-box>
        <a-box position="0 0.7 -0.38" width="1.1" height="0.5" depth="0.2" color="#EBE6DF"></a-box>
        <a-box position="-0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#EBE6DF"></a-box>
        <a-box position="0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#EBE6DF"></a-box>
        <a-box position="0 0.55 0" width="0.85" height="0.1" depth="0.75" color="#D9D2C5"></a-box>
      </a-entity>
      <a-entity position="3 0 0" rotation="0 -45 0">

        <a-box position="0 0.7 -0.38" width="1.1" height="0.5" depth="0.2" color="#EBE6DF"></a-box>
        <a-box position="-0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#EBE6DF"></a-box>
        <a-box position="0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#EBE6DF"></a-box>
        <a-box position="0 0.55 0" width="0.85" height="0.1" depth="0.75" color="#D9D2C5"></a-box>

      </a-entity>
      <a-entity position="5.84 2.2 2">
        <a-plane position="0 0 0" rotation="0 -90 0" width="2" height="2.5"

        <a-box position="0 0 0" rotation="0 -90 0" width="0.06" height="2.6" depth="0.06" color="#E8DCC8"></a-box>

  <script>
    // Loading screen
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
    }, 3500);

    // Room navigation
    const rooms = { living: 'living-room', dining: 'dining-room', bedroom: 'bedroom', kitchen: 'kitchen' };
    function goToRoom(room) {
      const rig = document.getElementById('rig');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      Object.values(rooms).forEach(r => {
        const el = document.getElementById(r);
        el.setAttribute('visible', false);
      });
      const target = document.getElementById(rooms[room]);
      target.setAttribute('visible', true);
      const targetPos = target.getAttribute('position');
      rig.setAttribute('position', `${targetPos.x} 0 0`);
    }
  </script>
