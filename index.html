<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Luxury House Interior - VR Experience</title>
  <meta name="description" content="Immersive VR tour of a luxurious house interior built with A-Frame">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.5.0/dist/aframe-extras.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 1.5s ease;
      font-family: 'Georgia', serif;
      color: #d4af37;
    }

    #loading-screen h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    #loading-screen p {
      font-size: 1rem;
      color: #c9b06b;
      letter-spacing: 2px;
    }

    .loader {
      width: 200px;
      height: 4px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 2px;
      margin-top: 30px;
      overflow: hidden;
    }

    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #d4af37, #f4e5b0, #d4af37);
      border-radius: 2px;
      animation: load 3s ease forwards;
    }

    @keyframes load {
      to {
        width: 100%;
      }
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #room-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .nav-btn {
      background: linear-gradient(135deg, #d4af37, #b8941f);
      color: #1a0a2e;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .nav-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
    }

    .nav-btn.active {
      background: #f4e5b0;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <h1>✦ MAISON DE LUXE ✦</h1>
    <p>Preparing Your Virtual Estate Tour</p>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>

  <div id="room-nav">
    <button class="nav-btn active" onclick="goToRoom('living')">Living Room</button>
    <button class="nav-btn" onclick="goToRoom('dining')">Dining Room</button>
    <button class="nav-btn" onclick="goToRoom('bedroom')">Bedroom</button>
    <button class="nav-btn" onclick="goToRoom('kitchen')">Kitchen</button>
  </div>

  <a-scene id="vr-scene" renderer="antialias: true; colorManagement: true" loading-screen="enabled: false">

    <!-- Asset Management -->
    <a-assets timeout="15000">
      <img id="wood-floor" src="textures/wood_floor.png" crossorigin="anonymous">
      <img id="marble-tex" src="textures/marble_texture.png" crossorigin="anonymous">
      <img id="wall-tex" src="textures/wall_texture.png" crossorigin="anonymous">
      <img id="ceiling-tex" src="textures/ceiling_texture.png" crossorigin="anonymous">
      <img id="painting" src="textures/painting_art.png" crossorigin="anonymous">
      <img id="bookshelf" src="textures/bookshelf_texture.png" crossorigin="anonymous">
      <img id="fireplace" src="textures/fireplace_texture.png" crossorigin="anonymous">
      <img id="rug-tex" src="textures/rug_texture.png" crossorigin="anonymous">
      <img id="window-view" src="textures/window_view.png" crossorigin="anonymous">
    </a-assets>

    <!-- Camera & Controls -->
    <a-entity id="rig" position="0 0 0">
      <a-entity id="camera" camera look-controls wasd-controls="acceleration:20" position="0 1.6 0">
        <a-cursor color="#d4af37" fuse="true" fuse-timeout="2000" raycaster="objects: .clickable"
          geometry="primitive: ring; radiusInner: 0.005; radiusOuter: 0.01" material="color: #d4af37; shader: flat">
        </a-cursor>
      </a-entity>
    </a-entity>

    <!-- Ambient & Directional Lighting -->
    <a-entity light="type: ambient; color: #FFF5E6; intensity: 0.4"></a-entity>
    <a-entity light="type: directional; color: #FFE4B5; intensity: 0.6" position="2 4 -1"></a-entity>

    <!-- ==================== LIVING ROOM ==================== -->
    <a-entity id="living-room" position="0 0 0">
      <!-- Floor -->
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="12" height="12"
        material="src: #wood-floor; repeat: 4 4"></a-plane>
      <!-- Ceiling -->
      <a-plane position="0 4 0" rotation="90 0 0" width="12" height="12"
        material="src: #ceiling-tex; repeat: 3 3"></a-plane>

      <!-- Walls -->
      <a-plane position="0 2 -6" width="12" height="4" material="src: #wall-tex; repeat: 3 1"></a-plane>
      <a-plane position="0 2 6" rotation="0 180 0" width="12" height="4"
        material="src: #wall-tex; repeat: 3 1"></a-plane>
      <a-plane position="-6 2 0" rotation="0 90 0" width="12" height="4"
        material="src: #wall-tex; repeat: 3 1"></a-plane>
      <a-plane position="6 2 0" rotation="0 -90 0" width="12" height="4"
        material="src: #wall-tex; repeat: 3 1"></a-plane>

      <!-- Crown Molding (top of walls) -->
      <a-box position="0 3.85 -5.95" width="12" height="0.15" depth="0.12" color="#E8DCC8"></a-box>
      <a-box position="0 3.85 5.95" width="12" height="0.15" depth="0.12" color="#E8DCC8"></a-box>
      <a-box position="-5.95 3.85 0" width="0.12" height="0.15" depth="12" color="#E8DCC8"></a-box>
      <a-box position="5.95 3.85 0" width="0.12" height="0.15" depth="12" color="#E8DCC8"></a-box>

      <!-- Baseboard -->
      <a-box position="0 0.08 -5.95" width="12" height="0.16" depth="0.08" color="#5C3A1E"></a-box>
      <a-box position="0 0.08 5.95" width="12" height="0.16" depth="0.08" color="#5C3A1E"></a-box>
      <a-box position="-5.95 0.08 0" width="0.08" height="0.16" depth="12" color="#5C3A1E"></a-box>
      <a-box position="5.95 0.08 0" width="0.08" height="0.16" depth="12" color="#5C3A1E"></a-box>

      <!-- Fireplace on back wall -->
      <a-image src="#fireplace" position="0 1.5 -5.85" width="3" height="2.8"></a-image>
      <a-box position="0 0.2 -5.7" width="2.5" height="0.15" depth="0.6" color="#8B7355"></a-box>
      <a-box position="0 2.95 -5.7" width="3.2" height="0.12" depth="0.5" material="src: #marble-tex"></a-box>

      <!-- Fire glow light -->
      <a-entity light="type: point; color: #FF6522; intensity: 0.8; distance: 6" position="0 1 -5.2">
        <a-animation attribute="light.intensity" from="0.6" to="1" dur="1500" direction="alternate" repeat="indefinite"
          easing="ease-in-out-sine"></a-animation>
      </a-entity>

      <!-- Large Sofa -->
      <a-entity position="0 0 -1.5">
        <a-box position="0 0.35 0" width="3.5" height="0.4" depth="1.1" color="#2C1B0E"></a-box>
        <a-box position="0 0.75 -0.4" width="3.5" height="0.5" depth="0.25" color="#3A2415"></a-box>
        <a-box position="-1.6 0.65 0" width="0.25" height="0.35" depth="1.1" color="#3A2415"></a-box>
        <a-box position="1.6 0.65 0" width="0.25" height="0.35" depth="1.1" color="#3A2415"></a-box>
        <!-- Cushions -->
        <a-box position="-0.8 0.6 0" width="0.9" height="0.12" depth="0.8" color="#8B1A1A"></a-box>
        <a-box position="0.8 0.6 0" width="0.9" height="0.12" depth="0.8" color="#8B1A1A"></a-box>
        <a-box position="0 0.6 0" width="0.9" height="0.12" depth="0.8" color="#6B0F0F"></a-box>
        <!-- Throw pillows -->
        <a-box position="-1.2 0.75 0.1" width="0.35" height="0.35" depth="0.1" rotation="0 0 5" color="#D4AF37"></a-box>
        <a-box position="1.2 0.75 0.1" width="0.35" height="0.35" depth="0.1" rotation="0 0 -5" color="#D4AF37"></a-box>
      </a-entity>

      <!-- Coffee Table -->
      <a-entity position="0 0 0.8">
        <a-box position="0 0.4 0" width="1.5" height="0.06" depth="0.8" material="src: #marble-tex"></a-box>
        <a-cylinder position="-0.55 0.2 -0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="0.55 0.2 -0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="-0.55 0.2 0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <a-cylinder position="0.55 0.2 0.25" radius="0.04" height="0.38" color="#D4AF37"></a-cylinder>
        <!-- Decorative books on table -->
        <a-box position="-0.3 0.47 0" width="0.3" height="0.06" depth="0.22" color="#1B3A4B"></a-box>
        <a-box position="-0.3 0.53 0" width="0.28" height="0.05" depth="0.2" color="#8B1A1A"></a-box>
        <!-- Vase -->
        <a-cylinder position="0.4 0.55 0" radius="0.08" height="0.25" color="#D4AF37"
          material="metalness: 0.7; roughness: 0.3"></a-cylinder>
      </a-entity>

      <!-- Side Armchairs -->
      <a-entity position="-3 0 0" rotation="0 45 0">
        <a-box position="0 0.35 0" width="1.1" height="0.35" depth="1" color="#2C1B0E"></a-box>
        <a-box position="0 0.7 -0.38" width="1.1" height="0.5" depth="0.2" color="#3A2415"></a-box>
        <a-box position="-0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#3A2415"></a-box>
        <a-box position="0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#3A2415"></a-box>
        <a-box position="0 0.55 0" width="0.85" height="0.1" depth="0.75" color="#6B0F0F"></a-box>
      </a-entity>
      <a-entity position="3 0 0" rotation="0 -45 0">
        <a-box position="0 0.35 0" width="1.1" height="0.35" depth="1" color="#2C1B0E"></a-box>
        <a-box position="0 0.7 -0.38" width="1.1" height="0.5" depth="0.2" color="#3A2415"></a-box>
        <a-box position="-0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#3A2415"></a-box>
        <a-box position="0.45 0.55 0" width="0.15" height="0.25" depth="1" color="#3A2415"></a-box>
        <a-box position="0 0.55 0" width="0.85" height="0.1" depth="0.75" color="#6B0F0F"></a-box>
      </a-entity>

      <!-- Persian Rug -->
      <a-plane position="0 0.02 0" rotation="-90 0 0" width="5" height="3.5" material="src: #rug-tex"></a-plane>

      <!-- Bookshelf on left wall -->
      <a-image src="#bookshelf" position="-5.85 2 -2" rotation="0 90 0" width="3" height="3.5"></a-image>
      <a-box position="-5.7 2 -2" rotation="0 90 0" width="3.1" height="3.6" depth="0.05"
        material="opacity: 0; transparent: true"></a-box>

      <!-- Painting on wall -->
      <a-entity position="3 2.5 -5.85">
        <a-image src="#painting" width="2" height="1.5"></a-image>
        <a-box position="0 0 -0.02" width="2.15" height="1.65" depth="0.05" color="#8B6914"></a-box>
      </a-entity>
      <a-entity position="-3 2.5 -5.85">
        <a-image src="#painting" width="1.5" height="1.2"></a-image>
        <a-box position="0 0 -0.02" width="1.65" height="1.35" depth="0.05" color="#8B6914"></a-box>
      </a-entity>

      <!-- Windows on right wall -->
      <a-entity position="5.84 2.2 -2">
        <a-image src="#window-view" rotation="0 -90 0" width="2" height="2.5"></a-image>
        <a-box position="0 0 0" rotation="0 -90 0" width="0.06" height="2.6" depth="0.06" color="#E8DCC8"
          class="window-frame"></a-box>
        <a-box position="0 0 0" rotation="0 -90 0" width="2.1" height="0.06" depth="0.06" color="#E8DCC8"></a-box>
        <a-entity light="type: point; color: #FFFDE7; intensity: 0.3; distance: 5" position="-0.5 0 0"></a-entity>
      </a-entity>
      <a-entity position="5.84 2.2 2">
        <a-image src="#window-view" rotation="0 -90 0" width="2" height="2.5"></a-image>
        <a-box position="0 0 0" rotation="0 -90 0" width="0.06" height="2.6" depth="0.06" color="#E8DCC8"></a-box>
        <a-box position="0 0 0" rotation="0 -90 0" width="2.1" height="0.06" depth="0.06" color="#E8DCC8"></a-box>
        <a-entity light="type: point; color: #FFFDE7; intensity: 0.3; distance: 5" position="-0.5 0 0"></a-entity>
      </a-entity>

      <!-- Chandelier -->
      <a-entity position="0 3.8 0">
        <a-cylinder position="0 0 0" radius="0.03" height="0.4" color="#D4AF37"
          material="metalness:0.8;roughness:0.2"></a-cylinder>
        <a-torus position="0 -0.3 0" radius="0.6" radius-tubular="0.015" color="#D4AF37"
          material="metalness:0.8;roughness:0.2"></a-torus>
        <a-torus position="0 -0.3 0" radius="0.35" radius-tubular="0.01" color="#D4AF37"
          material="metalness:0.8;roughness:0.2"></a-torus>
        <a-entity light="type: point; color: #FFF5E0; intensity: 1.2; distance: 10" position="0 -0.4 0"></a-entity>
        <!-- Candle lights around chandelier -->
        <a-sphere position="0.6 -0.25 0" radius="0.04" color="#FFF8DC"
          material="emissive: #FFD700; emissiveIntensity: 0.5"></a-sphere>
        <a-sphere position="-0.6 -0.25 0" radius="0.04" color="#FFF8DC"
          material="emissive: #FFD700; emissiveIntensity: 0.5"></a-sphere>
        <a-sphere position="0 -0.25 0.6" radius="0.04" color="#FFF8DC"
          material="emissive: #FFD700; emissiveIntensity: 0.5"></a-sphere>
        <a-sphere position="0 -0.25 -0.6" radius="0.04" color="#FFF8DC"
          material="emissive: #FFD700; emissiveIntensity: 0.5"></a-sphere>
      </a-entity>

      <!-- Floor Lamp -->
      <a-entity position="-4.5 0 2">
        <a-cylinder position="0 0 0" radius="0.25" height="0.05" color="#D4AF37"></a-cylinder>
        <a-cylinder position="0 0.8 0" radius="0.025" height="1.6" color="#D4AF37"></a-cylinder>
        <a-cone position="0 1.7 0" radius-bottom="0.3" radius-top="0.15" height="0.4" color="#F5E6CA"
          material="side: double; opacity: 0.9"></a-cone>
        <a-entity light="type: point; color: #FFE4B5; intensity: 0.5; distance: 4" position="0 1.8 0"></a-entity>
      </a-entity>

      <!-- Side Table with lamp -->
      <a-entity position="4.5 0 -3">
        <a-box position="0 0.3 0" width="0.6" height="0.6" depth="0.6" color="#5C3A1E"></a-box>
        <a-cylinder position="0 0.65 0" radius="0.05" height="0.4" color="#D4AF37"></a-cylinder>
        <a-cone position="0 0.95 0" radius-bottom="0.2" radius-top="0.1" height="0.3" color="#F5E6CA"
          material="side: double; opacity: 0.9"></a-cone>
        <a-entity light="type: point; color: #FFE4B5; intensity: 0.3; distance: 3" position="0 1.0 0"></a-entity>
      </a-entity>

      <!-- Indoor Plant -->
      <a-entity position="-4.8 0 -4.5">
        <a-cylinder position="0 0.25 0" radius="0.2" height="0.5" color="#8B6914"></a-cylinder>
        <a-sphere position="0 0.8 0" radius="0.45" color="#2D5016" material="roughness: 0.9"></a-sphere>
        <a-sphere position="0.15 1.1 0.1" radius="0.3" color="#3A6B1E" material="roughness: 0.9"></a-sphere>
        <a-sphere position="-0.1 1.0 -0.15" radius="0.25" color="#2D5016" material="roughness: 0.9"></a-sphere>
      </a-entity>

      <!-- Wall Sconces -->
      <a-entity position="-5.85 2.8 -4">
        <a-box rotation="0 90 0" width="0.15" height="0.25" depth="0.1" color="#D4AF37"
          material="metalness:0.7"></a-box>
        <a-entity light="type: point; color: #FFE4B5; intensity: 0.2; distance: 3" position="0.2 0 0"></a-entity>
      </a-entity>
      <a-entity position="-5.85 2.8 4">
        <a-box rotation="0 90 0" width="0.15" height="0.25" depth="0.1" color="#D4AF37"
          material="metalness:0.7"></a-box>
        <a-entity light="type: point; color: #FFE4B5; intensity: 0.2; distance: 3" position="0.2 0 0"></a-entity>
      </a-entity>

      <!-- Welcome Text (floating) -->
      <a-text value="Welcome to Maison de Luxe" position="0 3.2 -5.8" align="center" color="#D4AF37" font="mozillavr"
        width="6" anchor="center"></a-text>
    </a-entity>

    <!-- ==================== DINING ROOM ==================== -->
    <a-entity id="dining-room" position="20 0 0" visible="false">
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="10" height="10"
        material="src: #marble-tex; repeat: 3 3"></a-plane>
      <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10"
        material="src: #ceiling-tex; repeat: 2 2"></a-plane>
      <a-plane position="0 2 -5" width="10" height="4" material="src: #wall-tex; repeat: 2 1"></a-plane>
      <a-plane position="0 2 5" rotation="0 180 0" width="10" height="4"
        material="src: #wall-tex; repeat: 2 1"></a-plane>
      <a-plane position="-5 2 0" rotation="0 90 0" width="10" height="4"
        material="src: #wall-tex; repeat: 2 1"></a-plane>
      <a-plane position="5 2 0" rotation="0 -90 0" width="10" height="4"
        material="src: #wall-tex; repeat: 2 1"></a-plane>

      <!-- Dining Table -->
      <a-box position="0 0.75 0" width="3" height="0.08" depth="1.5" color="#5C3A1E"></a-box>
      <a-cylinder position="-1.2 0.37 -0.55" radius="0.06" height="0.7" color="#5C3A1E"></a-cylinder>
      <a-cylinder position="1.2 0.37 -0.55" radius="0.06" height="0.7" color="#5C3A1E"></a-cylinder>
      <a-cylinder position="-1.2 0.37 0.55" radius="0.06" height="0.7" color="#5C3A1E"></a-cylinder>
      <a-cylinder position="1.2 0.37 0.55" radius="0.06" height="0.7" color="#5C3A1E"></a-cylinder>

      <!-- Plates & Glasses -->
      <a-cylinder position="-0.8 0.81 -0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <a-cylinder position="0 0.81 -0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <a-cylinder position="0.8 0.81 -0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <a-cylinder position="-0.8 0.81 0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <a-cylinder position="0 0.81 0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <a-cylinder position="0.8 0.81 0.35" radius="0.14" height="0.02" color="#FFF8F0"></a-cylinder>
      <!-- Wine glasses -->
      <a-cylinder position="-0.5 0.88 -0.35" radius="0.03" height="0.15" color="#E0E0E0"
        material="transparent:true;opacity:0.5"></a-cylinder>
      <a-cylinder position="0.5 0.88 -0.35" radius="0.03" height="0.15" color="#E0E0E0"
        material="transparent:true;opacity:0.5"></a-cylinder>
      <!-- Centerpiece -->
      <a-cylinder position="0 0.9 0" radius="0.1" height="0.2" color="#D4AF37" material="metalness:0.7"></a-cylinder>
      <a-sphere position="0 1.1 0" radius="0.08" color="#FF6B6B"></a-sphere>
      <a-sphere position="0.08 1.05 0.05" radius="0.06" color="#FF4757"></a-sphere>

      <!-- Dining Chairs -->
      <a-entity position="-0.8 0 -1.1"><a-box position="0 0.35 0" width="0.5" height="0.05" depth="0.5"
          color="#5C3A1E"></a-box><a-box position="0 0.6 -0.22" width="0.5" height="0.55" depth="0.05"
          color="#5C3A1E"></a-box><a-box position="0 0.4 0" width="0.4" height="0.04" depth="0.4"
          color="#8B1A1A"></a-box></a-entity>
      <a-entity position="0 0 -1.1"><a-box position="0 0.35 0" width="0.5" height="0.05" depth="0.5"
          color="#5C3A1E"></a-box><a-box position="0 0.6 -0.22" width="0.5" height="0.55" depth="0.05"
          color="#5C3A1E"></a-box><a-box position="0 0.4 0" width="0.4" height="0.04" depth="0.4"
          color="#8B1A1A"></a-box></a-entity>
      <a-entity position="0.8 0 -1.1"><a-box position="0 0.35 0" width="0.5" height="0.05" depth="0.5"
          color="#5C3A1E"></a-box><a-box position="0 0.6 -0.22" width="0.5" height="0.55" depth="0.05"
          color="#5C3A1E"></a-box><a-box position="0 0.4 0" width="0.4" height="0.04" depth="0.4"

  <script>
    // Loading screen
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
    }, 3500);

    // Room navigation
    const rooms = { living: 'living-room', dining: 'dining-room', bedroom: 'bedroom', kitchen: 'kitchen' };
    function goToRoom(room) {
      const rig = document.getElementById('rig');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      Object.values(rooms).forEach(r => {
        const el = document.getElementById(r);
        el.setAttribute('visible', false);
      });
      const target = document.getElementById(rooms[room]);
      target.setAttribute('visible', true);
      const targetPos = target.getAttribute('position');
      rig.setAttribute('position', `${targetPos.x} 0 0`);
    }
  </script>
