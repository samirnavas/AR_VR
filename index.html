<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>3D House Model Showcase</title>
  <!-- Include A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <!-- Include a simple environment component to make the showcase look nice -->
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  <!-- Include A-Frame Extras for VR movement controls (thumbstick locomotion) -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
</head>

<body>
  <a-scene xr-mode-ui="enabled: true">
    <a-assets>
      <!-- Load the 3D GLB model -->
      <a-asset-item id="houseModel" src="hello_neighbor_pre_alpha_house_decorated.glb"></a-asset-item>
    </a-assets>

    <!-- Beautiful preset environment -->
    <a-entity
      environment="preset: forest; skyType: atmosphere; groundTexture: walkernoise; dressingAmount: 50"></a-entity>

    <!-- Display the 3D House Model -->
    <!-- We add a 'shadow' component to cast shadows. The scale/position might need tweaking based on the model's native size. -->
    <a-entity gltf-model="#houseModel" position="0 0 -10" scale="1 1 1" shadow="cast: true; receive: true"
      class="clickable"></a-entity>

    <!-- Optional additional lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.8" position="-1 4 2" shadow="cast: true"></a-light>

    <!-- VR Player Configuration Rig -->
    <!-- movement-controls provides keyboard (WASD) and VR controller thumbstick locomotion automatically -->
    <a-entity id="rig" movement-controls="speed: 0.2" position="0 0 0">

      <!-- Camera/Headset -->
      <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>

      <!-- Hand Controllers for Meta Quest / VR headsets -->
      <!-- Left Hand -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 50"></a-entity>
      <!-- Right Hand -->
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 50"></a-entity>

    </a-entity>
  </a-scene>
</body>

</html>
