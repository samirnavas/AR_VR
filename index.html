<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>3D House Model Showcase</title>
  <!-- Include A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <!-- Include a simple environment component to make the showcase look nice -->
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
      <!-- Load the 3D GLB model -->
      <a-asset-item id="houseModel" src="hello_neighbor_pre_alpha_house_decorated.glb"></a-asset-item>
    </a-assets>

    <!-- Beautiful preset environment -->
    <a-entity
      environment="preset: forest; skyType: atmosphere; groundTexture: walkernoise; dressingAmount: 50"></a-entity>

    <!-- Display the 3D House Model -->
    <!-- We add a 'shadow' component to cast shadows. The scale/position might need tweaking based on the model's native size. -->
    <a-entity gltf-model="#houseModel" position="0 0 -10" scale="1 1 1" shadow="cast: true; receive: true"></a-entity>

    <!-- Optional additional lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.8" position="-1 4 2" shadow="cast: true"></a-light>

    <!-- Camera with controls -->
    <a-entity position="0 1.6 0">
      <!-- We use fly: true so the user can freely explore the house model vertically -->
      <a-camera look-controls wasd-controls="acceleration: 20; fly: true"></a-camera>
    </a-entity>
  </a-scene>
</body>

</html>
